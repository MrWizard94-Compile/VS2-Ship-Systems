# This is an example mods.toml file. It contains the data relating to the loading mods.
# There are several mandatory (#mandatory) settings and many more that are optional (#optional).
# The overall format is standard TOML format, v0.5.0.
# Note that there are a couple of TOML lists in this file.
# Find more information on toml format here:  https://github.com/toml-lang/toml

# The name of the mod loader type to load - for regular Java it should be javafml
modLoader="javafml" #mandatory

# A version range to match for the mod loader - for regular Java it should be "[47,)"
loaderVersion="${loader_version_range}" #mandatory

# License
license="${mod_license}"

# A URL to query for updates for this mod. See the JSON update specification https://mcforge.readthedocs.io/en/latest/...
#updateJSONURL="https://files.minecraftforge.net/net/minecraftforge/forge/promotions_slim.json" #optional

# A URL for the "homepage" for this mod, displayed in the mod UI
#displayURL="https://example.com/" #optional

# A file name (in the root of the mod JAR) of a PNG file to display as the mod's logo in the mod UI.
#logoFile="vs2shipsystems.png" #optional

# A text field displayed in the mod UI
#credits="" #optional

# A text field displayed in the mod UI
authors="${mod_authors}" #optional

# Display Test - this is used by the server to determine if a mod is acceptable on a client
# MATCH_VERSION means the mod must match the version on the server exactly
# IGNORE_SERVER_VERSION means any version of this mod on the client is acceptable
# IGNORE_ALL_VERSION means the mod does not need to be present on the client
# NONE means the mod does not need to be present on the server
#displayTest="MATCH_VERSION" #mandatory

# The [[mods]] block allows you to declare multiple mods in a single file.
# Each [[mods]] block defines a mod and its metadata.
[[mods]] #mandatory

# The modid of the mod
modId="${mod_id}" #mandatory

# The version number of the mod
version="${mod_version}" #mandatory

# A display name for the mod
displayName="${mod_name}" #mandatory

# A URL to query for updates for this mod. See the JSON update specification https://docs.minecraftforge.net/en/fg-6.x/...
#updateJSONURL="https://example.com/updates.json" #optional

# A URL to the mod's homepage or download page.
#displayURL="https://example.com/" #optional

# A file name (in the root of the mod JAR) of a PNG file to display as the mod's logo in the mod UI.
#logoFile="examplemod.png" #optional

# A text field displayed in the mod UI
credits="Built on top of Valkyrien Skies 2" #optional

# A text field displayed in the mod UI
authors="${mod_authors}" #optional

# The description text for the mod (multi line!) (#mandatory)
description='''${mod_description}'''
# A dependency - use the . to chain calls to other dependency methods
# The following are only valid when the dependency is declared as a [[dependencies]] table.
[[dependencies.${mod_id}]] #optional
    # the modid of the dependency
    modId="forge" #mandatory
    # Does this dependency have to exist - if not, order below must be specified
    mandatory=true #mandatory
    # The version range of the dependency
    versionRange="${forge_version_range}" #mandatory
    # An ordering relationship for the dependency - BEFORE or AFTER required if the dependency is not mandatory
    ordering="NONE"
    # Side this dependency is applied on - BOTH, CLIENT or SERVER
    side="BOTH"

# Here's another dependency
[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

# Valkyrien Skies 2 dependency - CRITICAL for this mod
[[dependencies.${mod_id}]]
    modId="valkyrienskies"
    mandatory=true
    versionRange="[2.3,)"
    ordering="NONE"
    side="BOTH"
    # referralUrl="https://modrinth.com/mod/valkyrien-skies" #optional
